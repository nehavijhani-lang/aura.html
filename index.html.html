<!DOCTYPE html>
<html>
<head>
    <title>TSB V17.4: AURA MAX</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        
        #scope { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 100; }
        #dot { width: 4px; height: 4px; background: #fff; border-radius: 50%; box-shadow: 0 0 15px #0ff; }

        /* AURA LEVEL CLEARED SCREEN */
        #victory-screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; border: 20px double #0ff; animation: pulse-border 0.5s infinite;
        }
        @keyframes pulse-border { 0% { border-color: #0ff; } 50% { border-color: #f0f; } 100% { border-color: #0ff; } }
        
        .aura-text { font-size: 80px; font-weight: 900; color: #fff; text-shadow: 0 0 50px #0ff, 0 0 100px #f0f; margin: 0; }
        .sub-aura { font-size: 30px; color: #0ff; letter-spacing: 10px; margin-bottom: 30px; }

        #ui-top { position: absolute; top: 20px; left: 20px; z-index: 110; display: flex; gap: 15px; }
        .btn { background: #0ff; color: #000; border: none; padding: 10px 20px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; }
        #hud { background: rgba(0,0,0,0.8); padding: 15px; border-left: 4px solid #0ff; color: #fff; }
        #start { position: fixed; inset: 0; background: #000; color: #0ff; display: flex; align-items: center; justify-content: center; z-index: 2000; cursor: pointer; font-size: 30px; }
    </style>
</head>
<body>

<div id="start" onclick="begin()">[ ENABLE AUDIO & START MISSION ]</div>

<div id="victory-screen">
    <div class="sub-aura">MISSION ACCOMPLISHED</div>
    <div class="aura-text">AURA +10,000,000</div>
    <div style="color: #f0f; margin-top: 20px;">GOD-TIER AIM DETECTED</div>
    <button class="btn" style="margin-top: 40px;" onclick="location.reload()">REPLAY</button>
</div>

<div id="ui-top">
    <div id="hud"><b>HOSTILES: <span id="count">50</span></b></div>
    <button class="btn" onclick="location.reload()">RESTART</button>
</div>

<div id="scope"><div id="dot"></div></div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    let scene, camera, renderer, enemies = [], bloodParticles = [];
    let botCount = 50, dead = false, raycaster = new THREE.Raycaster();
    let isFiring = false, audioCtx, mainGain;

    window.begin = () => {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        mainGain = audioCtx.createGain();
        mainGain.connect(audioCtx.destination);
        
        document.getElementById('start').style.display = 'none';
        document.body.requestPointerLock();
        init();
    };

    function playShotSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
        osc.connect(g); g.connect(mainGain);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function playWinSound() {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 1);
        g.gain.setValueAtTime(0.2, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.5);
        osc.connect(g); g.connect(mainGain);
        osc.start(); osc.stop(audioCtx.currentTime + 1.5);
    }

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 2000);
        camera.position.set(0, 18, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshStandardMaterial({color: 0x050505}));
        floor.rotation.x = -Math.PI/2; scene.add(floor);
        scene.add(new THREE.GridHelper(1000, 40, 0x00ffff, 0x111111));
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        for(let i=0; i<50; i++) spawnStickman();

        document.addEventListener('mousemove', e => {
            if(document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.0015;
                camera.rotation.x -= e.movementY * 0.0015;
                camera.rotation.x = Math.max(-0.9, Math.min(0.9, camera.rotation.x));
            }
        });

        document.addEventListener('mousedown', () => isFiring = true);
        document.addEventListener('mouseup', () => isFiring = false);
        loop();
    }

    function spawnStickman() {
        const bot = new THREE.Group();
        const mat = new THREE.MeshStandardMaterial({color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 10});
        const part = (w, h, y, n) => {
            const m = new THREE.Mesh(new THREE.CapsuleGeometry(w, h), mat);
            m.position.y = y; m.name = n; bot.add(m); return m;
        };
        bot.parts = { head: part(0.3, 0.1, 2.2, 'head'), body: part(0.2, 0.8, 1.4, 'body'), lLeg: part(0.08, 0.7, 0.6, 'leg'), rLeg: part(0.08, 0.7, 0.6, 'leg') };
        const dist = 130 + Math.random()*200;
        const ang = (Math.random() - 0.5) * (Math.PI / 1.2);
        bot.position.set(Math.sin(ang)*dist, 0, -Math.cos(ang)*dist);
        bot.userData = { alive: true, speed: 0.05 + Math.random()*0.05 };
        enemies.push(bot);
        scene.add(bot);
    }

    function fire() {
        if(dead) return;
        playShotSound();
        camera.position.x += (Math.random() - 0.5) * 0.1;

        raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
        const hits = raycaster.intersectObjects(enemies, true);

        if(hits.length > 0) {
            const hitPart = hits[0].object;
            const bot = hitPart.parent;
            spawnBlood(hits[0].point);
            bot.remove(hitPart);
            if(hitPart.name === 'head' || hitPart.name === 'body') {
                if(bot.userData.alive) {
                    bot.userData.alive = false;
                    botCount--;
                    document.getElementById('count').innerText = botCount;
                    if(botCount <= 0) {
                        dead = true;
                        document.getElementById('victory-screen').style.display = 'flex';
                        playWinSound();
                        document.exitPointerLock();
                    }
                }
            }
        }
    }

    function spawnBlood(pos) {
        for(let i=0; i<15; i++) {
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.12), new THREE.MeshBasicMaterial({color: 0xff0000}));
            b.position.copy(pos);
            b.userData = { v: new THREE.Vector3((Math.random()-0.5)*0.6, Math.random()*0.6, (Math.random()-0.5)*0.6), t: 40 };
            bloodParticles.push(b); scene.add(b);
        }
    }

    function loop() {
        requestAnimationFrame(loop);
        if(!dead) {
            if(isFiring) fire();
            else camera.position.lerp(new THREE.Vector3(0, 18, 0), 0.1);

            enemies.forEach(bot => {
                if(bot.userData.alive) {
                    const dir = new THREE.Vector3(0,0,0).sub(bot.position).normalize();
                    bot.position.addScaledVector(dir, bot.userData.speed);
                    bot.lookAt(0,0,0);
                    if(bot.position.distanceTo(new THREE.Vector3(0,0,0)) < 11) {
                        dead = true; 
                        document.exitPointerLock();
                        location.reload(); 
                    }
                } else { bot.rotation.x = Math.PI/2; bot.position.y = 0.1; }
            });
        }
        bloodParticles.forEach((b, i) => {
            b.position.add(b.userData.v); b.userData.v.y -= 0.02;
            b.userData.t--; if(b.userData.t <= 0) { scene.remove(b); bloodParticles.splice(i,1); }
        });
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
